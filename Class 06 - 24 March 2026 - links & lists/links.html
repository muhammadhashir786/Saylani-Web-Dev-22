<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
</head>
<body>
    <h1>Links</h1>
    <!-- links are created using a tag, called anchor tag -->

    <!-- href is the attribute in a tag -->

    <!-- link ka text link se related hona chahye -->

    <!-- we can use links inside lists -->

    <!-- there is a target attribute in a tag used to open link in a next/new tab -->
    
    <a href="https://www.github.com">github</a>
    <a href="https://www.google.com" target="_blank">Google</a>

    <!-- link to any website is called absolute url -->
    <!-- URL stands for Uniform Resource Locator -->

    <!-- Relative URL -->
    
    <!-- relative link stats with "./" -->
     
    <a href="./list.html">List</a>    

    <!-- home k page p home ka link add krenge structure ko maintain rekahne k lye  -->

    <!-- relative page k ander website ki domain name nhi likha jata hai  -->
    <!-- absolute page k ander website ki domain name likha jata hai  -->

    <!-- to link to an email add "mailto:" before your email -->

    <a href="mailto:abc@gmail.com">content</a>

    <!-- to link to whatsapp no -->

    <a href="https://wa.me/92...">whatsapp</a>

    &text?=something


</body>
</html>
